name: Update Subscription

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download subconverter
        run: |
          wget https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz
          tar -zxvf subconverter_linux64.tar.gz
          chmod +x subconverter/subconverter

      - name: Standardize Sources with timeout
        run: |
          mkdir -p standard
          while read url; do
            filename=$(basename $url)
            echo "Processing $url ..."
            timeout 15 ./subconverter/subconverter -i "$url" -t clash -o "standard/$filename" || echo "⚠️ skip $url"
          done < sources.txt

      - name: Merge YAMLs
        run: |
          echo "proxies:" > output.yaml
          for f in standard/*.yaml; do
            if [ -s "$f" ]; then
              yq eval '.proxies' "$f" >> output.yaml
            else
              echo "⚠️ skip empty file $f"
            fi
          done
          yq eval-all 'select(fileIndex == 0) * select(fileIndex == 1)' config.yaml output.yaml > final.yaml
          mv final.yaml output.yaml

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output.yaml
          git commit -m "update subscription" || echo "no changes"
          git push
