name: Update Subscription

on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时更新一次
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Install subconverter
        run: |
          git clone https://github.com/tindy2013/subconverter.git
          cd subconverter
          chmod +x subconverter

      - name: ⚙️ Generate Subscription
        run: |
          cd subconverter

          # 生成 pref.ini
          cat > pref.ini <<EOF
url=$(paste -sd '|' ../sources.txt)
target=clash
emoji=true
list=true
sort=true
udp=true
scv=true
fdn=true
config=../config.yaml
output=../output.yaml
EOF

          ./subconverter

      - name: 📤 Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output.yaml
          git commit -m "update subscription" || echo "no changes"
          git push
