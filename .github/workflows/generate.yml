name: Auto Clash

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时自动跑
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install pyyaml requests
      - run: python scripts/generate_final_clash.py
      - run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add output/*
          git commit -m "update yaml" || echo "no change"
          git push
